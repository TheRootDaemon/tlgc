name: Code Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  format:
    name: format
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Setup gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Format
        run: gofumpt -extra -l -w .

  golangci:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  tests:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            race: true
          - os: windows-latest
            race: true
          - os: macos-latest
            race: true
          - os: ubuntu-24.04-arm
            race: true
          - os: windows-11-arm
            race: false

    steps:
      - uses: actions/checkout@v6

      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run tests
        if: ${{ !matrix.race }}
        run: go test ./...

      - name: Run tests with concurrency checks
        if: ${{ matrix.race }}
        run: go test -race ./...
